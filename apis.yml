aid: harvey-ai
name: Harvey
description: Harvey is a domain-specific AI platform built for elite law firms and
  in-house legal departments. Its product suite includes Assistant (question answering,
  document analysis, and drafting), Vault (secure document storage and bulk analysis),
  Knowledge (legal, regulatory, and tax research), Workflow Agents (pre-built and
  customizable legal agents), Harvey Mobile, and an Ecosystem of integrations with
  existing legal tools. Harvey is sold via enterprise contracts to large law firms
  and corporate legal teams, and does not currently publish a self-serve public developer
  API; integrations are arranged through direct sales and partnership engagements.
