  MEMO
  PLEADING
  CORRESPONDENCE
  EXHIBIT
  DEPOSITION
  STATUTE
  REGULATION
  CASE_LAW
  PATENT
  TRADEMARK
  AGREEMENT
  NDA
  LEASE
  POLICY
  REPORT
  OTHER
