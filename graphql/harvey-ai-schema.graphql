"""
Harvey AI GraphQL Schema
Conceptual schema for the Harvey legal AI platform serving law firms and in-house legal departments.
Covers matters, documents, research, drafting, review, contracts, litigation, due diligence, and platform management.
"""

schema {
  query: Query
  mutation: Mutation
}

# ─── Root Types ───────────────────────────────────────────────────────────────

type Query {
  matter(id: ID!): Matter
  matters(filter: MatterFilter, pagination: PaginationInput): MatterConnection
  document(id: ID!): Document
  documents(matterId: ID, filter: DocumentFilter, pagination: PaginationInput): DocumentConnection
  research(id: ID!): Research
  researchResults(queryId: ID!, pagination: PaginationInput): ResearchResultConnection
  draft(id: ID!): Draft
  drafts(matterId: ID, pagination: PaginationInput): DraftConnection
  review(id: ID!): Review
  contract(id: ID!): Contract
  contracts(matterId: ID, filter: ContractFilter, pagination: PaginationInput): ContractConnection
  brief(id: ID!): Brief
  memo(id: ID!): Memo
  conversation(id: ID!): Conversation
  conversations(pagination: PaginationInput): ConversationConnection
  task(id: ID!): Task
  tasks(matterId: ID, filter: TaskFilter, pagination: PaginationInput): TaskConnection
  jurisdiction(id: ID!): Jurisdiction
  organization: Organization
  models: [Model!]!
  apiKey(id: ID!): APIKey
  apiKeys: [APIKey!]!
  currentUser: TeamDetails
}

type Mutation {
  createMatter(input: CreateMatterInput!): Matter!
  updateMatter(id: ID!, input: UpdateMatterInput!): Matter!
  closeMatter(id: ID!): Matter!
  uploadDocument(input: UploadDocumentInput!): Document!
  analyzeDocument(id: ID!, options: AnalysisOptions): DocumentAnalysis!
  submitResearchQuery(input: ResearchQueryInput!): Research!
  createDraft(input: CreateDraftInput!): Draft!
  updateDraft(id: ID!, input: UpdateDraftInput!): Draft!
  requestReview(input: ReviewInput!): Review!
  compareDocuments(input: CompareInput!): Compare!
  createContract(input: CreateContractInput!): Contract!
  analyzeContract(id: ID!, options: ContractAnalysisOptions): ContractAnalysis!
  createBrief(input: CreateBriefInput!): Brief!
  createMemo(input: CreateMemoInput!): Memo!
  startConversation(input: StartConversationInput!): Conversation!
  sendMessage(conversationId: ID!, input: MessageInput!): Message!
  createTask(input: CreateTaskInput!): Task!
  updateTask(id: ID!, input: UpdateTaskInput!): Task!
  runDueDiligence(input: DueDiligenceInput!): DueDiligence!
  generateTimeline(matterId: ID!): Timeline!
  createAPIKey(input: CreateAPIKeyInput!): APIKey!
  revokeAPIKey(id: ID!): Boolean!
  updateOrganization(input: UpdateOrganizationInput!): Organization!
}

# ─── Matter Types ─────────────────────────────────────────────────────────────

"""
A legal matter or case managed within Harvey.
"""
type Matter {
  id: ID!
  name: String!
  description: String
  type: MatterType!
  status: MatterStatus!
  details: MatterDetails
  documents: DocumentConnection
  tasks: TaskConnection
  conversations: ConversationConnection
  timeline: Timeline
  jurisdiction: Jurisdiction
  assignees: [TeamDetails!]
  tags: [String!]
  createdAt: String!
  updatedAt: String!
  closedAt: String
}

"""
Detailed metadata about a legal matter.
"""
type MatterDetails {
  clientName: String
  clientId: ID
  opposingParty: String
  leadAttorney: String
  practiceArea: String
  estimatedValue: Float
  currency: String
  deadline: String
  courtName: String
  caseNumber: String
  filingDate: String
  jurisdiction: Jurisdiction
  confidentiality: String
  billingCode: String
  notes: String
}

"""
Categories of legal matter types.
"""
enum MatterType {
  LITIGATION
  TRANSACTION
  REGULATORY
  ADVISORY
  DUE_DILIGENCE
  COMPLIANCE
  IP
  EMPLOYMENT
  REAL_ESTATE
  TAX
  BANKRUPTCY
  CORPORATE
  OTHER
}

"""
Lifecycle status of a legal matter.
"""
enum MatterStatus {
  OPEN
  IN_PROGRESS
  PENDING_REVIEW
  ON_HOLD
  CLOSED
  ARCHIVED
}

